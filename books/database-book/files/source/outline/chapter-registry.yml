# Chapter registry — resolves folder-name mismatches between draft, image, and source paths
# See: plans/book-edit/book-plan-codex.md
# See: book.yml for chapter order and titles
#
# Fields:
#   id             — stable slug used as CSV content_id and Cloudinary folder name
#   order          — display/sort order (can change; id is durable)
#   title          — full chapter title
#   source_folder  — folder name under files/source/chapters/
#   draft_folder   — folder name under BITM330-Book-draft/chapter-drafts/ on Drive
#   image_folder   — folder name under .images/ on Drive (null if none)
#   cloudinary_folder — Cloudinary subfolder under Database-book-BITM330/
#   notes          — migration notes

chapters:
  - id: introduction-to-course
    order: 1
    title: "Introduction to the Textbook"
    source_folder: ch01-introduction-to-course
    draft_folder: ch01-introduction-to-course
    image_folder: ch01-welcome-to-the-textbook
    cloudinary_folder: ch01-introduction-to-course

  - id: mis-and-bitm
    order: 2
    title: "Foundations of Information Systems"
