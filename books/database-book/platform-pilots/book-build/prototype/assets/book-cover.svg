<svg xmlns="http://www.w3.org/2000/svg" width="720" height="960" viewBox="0 0 720 960" role="img" aria-labelledby="title desc">
  <title id="title">BITM330 digital textbook cover prototype</title>
  <desc id="desc">A warm academic book cover with layered panels, data motifs, and DIMA Publishing placeholder branding.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#113f45"/>
      <stop offset="100%" stop-color="#285d61"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1dfc0"/>
      <stop offset="100%" stop-color="#ba8335"/>
    </linearGradient>
  </defs>
  <rect width="720" height="960" rx="48" fill="url(#bg)"/>
  <rect x="40" y="40" width="640" height="880" rx="34" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.16)"/>
  <rect x="88" y="110" width="544" height="152" rx="24" fill="#f8f2e7"/>
  <text x="112" y="170" fill="#163e42" font-family="Georgia, serif" font-size="28" letter-spacing="4">DIMA PUBLISHING</text>
  <text x="112" y="220" fill="#163e42" font-family="Georgia, serif" font-size="20">Digital textbook platform prototype</text>
  <text x="88" y="364" fill="#ffffff" font-family="Georgia, serif" font-size="56">Using Data to Drive</text>
  <text x="88" y="428" fill="#ffffff" font-family="Georgia, serif" font-size="56">Business Performance</text>
  <text x="88" y="490" fill="#e6f1f1" font-family="Arial, sans-serif" font-size="28">Databases, information systems, analytics, and decisions</text>
  <g transform="translate(88 585)">
    <rect width="544" height="188" rx="26" fill="#102f34" stroke="rgba(255,255,255,0.12)"/>
    <path d="M46 120 H150 L198 74 H286 L350 126 H498" fill="none" stroke="url(#gold)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="46" cy="120" r="14" fill="#f1dfc0"/>
    <circle cx="150" cy="120" r="14" fill="#e9c98d"/>
    <circle cx="198" cy="74" r="14" fill="#dca85e"/>
    <circle cx="286" cy="74" r="14" fill="#f1dfc0"/>
    <circle cx="350" cy="126" r="14" fill="#e9c98d"/>
    <circle cx="498" cy="126" r="14" fill="#dca85e"/>
    <text x="46" y="46" fill="#d8e7e8" font-family="Arial, sans-serif" font-size="20">Data</text>
    <text x="128" y="46" fill="#d8e7e8" font-family="Arial, sans-serif" font-size="20">Tables</text>
    <text x="212" y="46" fill="#d8e7e8" font-family="Arial, sans-serif" font-size="20">Relationships</text>
    <text x="368" y="46" fill="#d8e7e8" font-family="Arial, sans-serif" font-size="20">Queries</text>
    <text x="452" y="46" fill="#d8e7e8" font-family="Arial, sans-serif" font-size="20">Decisions</text>
  </g>
  <text x="88" y="840" fill="#ffffff" font-family="Arial, sans-serif" font-size="24">Author: Nimrod Dvir, PhD</text>
  <text x="88" y="878" fill="#d7e8e9" font-family="Arial, sans-serif" font-size="18">Static prototype for a reader-first academic platform</text>
